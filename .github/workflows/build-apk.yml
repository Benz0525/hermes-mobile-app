name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci
      
      - name: Generate Android project
        run: npx expo prebuild --platform android --clean
      
      - name: Inject windowSoftInputMode
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if grep -q 'windowSoftInputMode' "$MANIFEST"; then
            sed -i 's/android:windowSoftInputMode="[^"]*"/android:windowSoftInputMode="adjustPan"/' "$MANIFEST"
          else
            sed -i 's/<activity /<activity android:windowSoftInputMode="adjustPan" /' "$MANIFEST"
          fi
          echo "=== Verify ==="
          grep 'windowSoftInputMode' "$MANIFEST"
      
      - name: Build APK
        run: cd android && ./gradlew assembleRelease
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hermes-chat-apk
          path: android/app/build/outputs/apk/release/app-release.apk
